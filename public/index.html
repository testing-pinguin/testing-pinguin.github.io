<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Procvičování tropů a figur</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; }
        input { margin-bottom: 10px; }
        .correct { color: green; }
        .incorrect { color: red; }
        #result { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<h1>Procvičování tropů a figur</h1>

<label for="count">Počet otázek:</label>
<input id="count" type="number" value="5" min="1" max="50">
<button onclick="start()">Start</button>

<div id="quiz"></div>

<button id="submit" style="display:none;">Ověřit odpovědi</button>

<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
